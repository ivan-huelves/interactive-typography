<!DOCTYPE html>
<html>
  <head>
    <title>{% if page.title %}{{ page.title }} – {% endif %}{{ site.name }} – {{ site.description }}</title>

    {% include meta.html %}

    <!--[if lt IE 9]>
      <script src="http://html5shiv.googlecode.com/svn/trunk/html5.js"></script>
    <![endif]-->

    <link rel="stylesheet" type="text/css" href="{{ site.baseurl }}/style.css" />
    <link rel="alternate" type="application/rss+xml" title="{{ site.name }} - {{ site.description }}" href="{{ site.baseurl }}/feed.xml" />

    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">

    <!-- Created with Jekyll Now - http://github.com/barryclark/jekyll-now -->
  </head>

  <body>
    <div class="wrapper-masthead">
      <div class="container">
        <header class="masthead clearfix">
 

          <div class="site-info">
            <h1 class="site-name"><a href="{{ site.baseurl }}/">{{ site.name }}</a></h1>
            <p class="site-description">{{ site.description }}</p>
          </div>

         <nav class="site-nav">
    <a href="{{ site.baseurl }}/about/">About</a>
    <a href="{{ site.baseurl }}/blog/">Blog</a>
    <a href="{{ site.baseurl }}/prototypes/">Prototypes</a>
    <a href="{{ site.baseurl }}/teaching/">Teaching</a>
    <a href="{{ site.baseurl }}/referentes/">References</a>
</nav>
        </header>
      </div>
    </div>

    <div id="main" role="main" class="container">
      {{ content }}
    </div>

    <div class="wrapper-footer">
      <div class="container">
        <footer>
  <p>
    © {{ site.time | date: '%Y' }} Iván Huelves Illas — 
    <a href="https://github.com/ivan-huelves" target="_blank">GitHub</a> — 
    <a href="https://www.linkedin.com/in/ivan-huelves-illas/" target="_blank">LinkedIn</a> — 
    <span class="email-protector">se.dirdamdse@sevleuhi</span>
  </p>
</footer>
      </div>
    </div>

    {% include analytics.html %}
  </body>
</html>
